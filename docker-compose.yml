version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: doceira-postgres
    environment:
      POSTGRES_USER: doceira
      POSTGRES_PASSWORD: doceira123
      POSTGRES_DB: doceira_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: